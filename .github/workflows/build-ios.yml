name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove vendor override
        run: rm -f .cargo/config.toml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ios-

      - name: Install OpenSSL
        run: brew install openssl@3

      - name: Install dioxus-cli
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            "https://github.com/DioxusLabs/dioxus/releases/download/v0.7.9/dx-aarch64-apple-darwin.tar.gz" \
            -o /tmp/dx.tar.gz
          tar -xzf /tmp/dx.tar.gz -C /tmp
          chmod +x /tmp/dx
          sudo mv /tmp/dx /usr/local/bin/dx
          dx --version

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build iOS app
        working-directory: crates/divines-web
        run: dx build --platform ios --release --features mobile
        env:
          CARGO_HTTP_MULTIPLEXING: "false"
          CARGO_NET_RETRY: "5"

      - name: Prepare IPA (minimal - no post-processing)
        run: |
          APP_PATH=$(find . -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi
          echo "Found app: $APP_PATH"

          # List original contents
          echo "=== Original app contents ==="
          find "$APP_PATH" -type f | while read f; do echo "  $f ($(stat -f%z "$f") bytes)"; done

          # Read original Info.plist
          echo "=== Original Info.plist ==="
          cat "$APP_PATH/Info.plist" || echo "No Info.plist found"

          # Create entitlements for ad-hoc signing (required for TrollStore)
          printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0">' \
            '<dict>' \
            '    <key>get-task-allow</key>' \
            '    <true/>' \
            '</dict>' \
            '</plist>' > /tmp/entitlements.plist

          # Find the executable name from Info.plist
          EXEC_NAME=$(plutil -extract CFBundleExecutable raw "$APP_PATH/Info.plist" 2>/dev/null || echo "")
          if [ -z "$EXEC_NAME" ]; then
            EXEC_NAME=$(find "$APP_PATH" -maxdepth 1 -type f ! -name "*.plist" ! -name "*.json" | head -1 | xargs basename)
          fi
          echo "Executable name: $EXEC_NAME"

          # Sign the executable first with entitlements
          if [ -n "$EXEC_NAME" ] && [ -f "$APP_PATH/$EXEC_NAME" ]; then
            echo "Signing executable: $APP_PATH/$EXEC_NAME"
            codesign --force --sign - --entitlements /tmp/entitlements.plist "$APP_PATH/$EXEC_NAME"
          fi

          # Sign the app bundle
          echo "Signing app bundle: $APP_PATH"
          codesign --force --sign - --entitlements /tmp/entitlements.plist "$APP_PATH"

          # Verify
          echo "=== Codesign verification ==="
          codesign -dv "$APP_PATH" 2>&1 || echo "Codesign verification failed"

          echo "=== Final app contents ==="
          find "$APP_PATH" -type f | while read f; do echo "  $f ($(stat -f%z "$f") bytes)"; done

      - name: Package IPA
        run: |
          APP_PATH=$(find . -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          IPA_NAME="Divines-unsigned.ipa"
          zip -r "$IPA_NAME" Payload
          rm -rf Payload
          echo "Created IPA: $IPA_NAME"

      - name: Delete old artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          artifacts=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/actions/artifacts?name=divines-ios-ipa&per_page=100")
          count=$(echo "$artifacts" | jq '.total_count // 0')
          if [ "$count" -gt 0 ]; then
            echo "$artifacts" | jq -r '.artifacts[].id' | while read -r id; do
              curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "${{ github.api_url }}/repos/${{ github.repository }}/actions/artifacts/$id"
            done
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: divines-ios-ipa
          path: ./*.ipa
          if-no-files-found: warn
